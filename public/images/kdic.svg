  <text x="40" y="38" font-family="'Inter', sans-serif" font-weight="bold" font-size="24" fill="#ffffff">KDIC Islamabad</text>
  <!-- Nav items -->
  <text x="550" y="36" font-family="'Inter', sans-serif" font-size="14" fill="#ffffff" opacity="0.9">Services • Implants • Book Appointment</text>
