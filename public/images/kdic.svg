  <rect x="40" y="100" width="720" height="240" rx="12" fill="#ccfbf1"/>
  <text x="80" y="180" font-family="'Inter', sans-serif" font-weight="bold" font-size="36" fill="#115e59">UK-Standard Dental Care</text>
  <text x="80" y="220" font-family="'Inter', sans-serif" font-size="16" fill="#134e4a">State-of-the-art dental implants, orthodontics &amp; smile design</text>
