<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#fafaf9"/>
  <!-- Decorative top bar -->
  <rect width="800" height="60" fill="#292524"/>
  <text x="40" y="38" font-family="'Inter', sans-serif" font-weight="bold" font-size="24" fill="#e7e5e4">HIDDEN HILLS RESORT</text>
  <!-- Nav items -->
  <text x="560" y="36" font-family="'Inter', sans-serif" font-size="14" fill="#e7e5e4" opacity="0.9">Rooms • Dining • Events • Booking</text>
  <!-- Hero Section -->
  <rect x="40" y="100" width="720" height="240" rx="12" fill="#e7e5e4"/>
  <text x="80" y="180" font-family="'Inter', sans-serif" font-weight="bold" font-size="36" fill="#1c1917">Luxury Mountain Escape</text>
  <text x="80" y="220" font-family="'Inter', sans-serif" font-size="16" fill="#44403c">Experience premium hospitality nestled in the serene valleys of Mansehra</text>
  <!-- Button -->
  <rect x="80" y="250" width="160" height="40" rx="20" fill="#d97706"/>
  <text x="110" y="274" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#ffffff">Reserve Cabin</text>
  <!-- Grid Preview -->
  <rect x="40" y="360" width="340" height="100" rx="8" fill="#ffffff" stroke="#78716c" stroke-width="2"/>
  <text x="60" y="415" font-family="'Inter', sans-serif" font-weight="semibold" font-size="16" fill="#1c1917">Premium Accommodations</text>
  <rect x="420" y="360" width="340" height="100" rx="8" fill="#ffffff" stroke="#78716c" stroke-width="2"/>
  <text x="440" y="415" font-family="'Inter', sans-serif" font-weight="semibold" font-size="16" fill="#1c1917">Exclusive Event Spaces</text>
</svg>
